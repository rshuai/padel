<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Padel Payment Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-cream: #f8f6f1;
        --bg-sand: #efe6d6;
        --ink: #1f2a35;
        --ink-soft: #4f5c6a;
        --line: #d8cfbf;
        --card: #fffdf8;
        --teal: #126b67;
        --teal-strong: #0d524f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 7% 8%, rgba(201, 119, 42, 0.2), transparent 38%),
          radial-gradient(circle at 94% 2%, rgba(18, 107, 103, 0.2), transparent 34%),
          linear-gradient(170deg, var(--bg-cream), var(--bg-sand));
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .card {
        width: min(560px, 95vw);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 1.25rem;
        box-shadow: 0 12px 30px rgba(24, 31, 38, 0.08);
      }

      h1 {
        margin: 0;
        font-family: "Bricolage Grotesque", "Space Grotesk", sans-serif;
        font-size: clamp(1.5rem, 3vw, 2rem);
      }

      p {
        margin: 0.6rem 0 0;
        color: var(--ink-soft);
        line-height: 1.45;
      }

      .links {
        margin-top: 1rem;
        display: grid;
        gap: 0.6rem;
      }

      a {
        display: block;
        text-decoration: none;
        color: #fff;
        background: linear-gradient(120deg, var(--teal), var(--teal-strong));
        border-radius: 12px;
        padding: 0.7rem 0.85rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Padel Payment Tracker</h1>
      <p>Consolidation app removed. Use one of the links below.</p>
      <div class="links">
        <a href="/padel.html">Open Main App</a>
        <a href="/padel-view.html">Open View-Only App</a>
      </div>
    </main>
  </body>
</html>
